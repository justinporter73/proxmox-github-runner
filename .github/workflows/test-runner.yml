name: Test Self-Hosted Runner
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - name: Check environment
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $(uname -a)"
          echo "User: $(whoami)"
          echo "Home: $HOME"
          echo "Disk: $(df -h / | tail -1)"
